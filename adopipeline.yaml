trigger:
- main

variables:
  imageTag: $(Build.BuildId)
  ACR_NAME: youracrname
  ACR_LOGIN_SERVER: youracrname.azurecr.io
  IMAGE_NAME: rudra-app

stages:

# ========================
# 1. BUILD & TEST
# ========================
- stage: Build_Test
  displayName: Build and Test
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    - script: |
        echo "Installing dependencies"
        pip install -r requirements.txt
      displayName: Install Dependencies

    - script: |
        echo "Running tests"
        pytest || true
      displayName: Run Unit Tests

# ========================
# 2. DOCKER BUILD
# ========================
- stage: Docker_Build
  dependsOn: Build_Test
  jobs:
  - job: Build_Image
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: Docker@2
      displayName: Build Docker Image
      inputs:
        containerRegistry: 'ACR-ServiceConnection'
        repository: $(IMAGE_NAME)
        command: build
        Dockerfile: '**/Dockerfile'
        tags: |
          $(imageTag)

# ========================
# 3. TRIVY SCAN
# ========================
- stage: Security_Scan
  dependsOn: Docker_Build
  jobs:
  - job: Trivy
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - script: |
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
        sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

        trivy image $(ACR_LOGIN_SERVER)/$(IMAGE_NAME):$(imageTag) --severity HIGH,CRITICAL --exit-code 1 || true
      displayName: Run Trivy Scan

# ========================
# 4. PUSH TO ACR
# ========================
- stage: Push_Image
  dependsOn: Security_Scan
  jobs:
  - job: Push
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - task: Docker@2
      displayName: Push Image to ACR
      inputs:
        containerRegistry: 'ACR-ServiceConnection'
        repository: $(IMAGE_NAME)
        command: push
        tags: |
          $(imageTag)

# ========================
# 5. UPDATE GIT (GITOPS)
# ========================
- stage: Update_Manifest
  dependsOn: Push_Image
  jobs:
  - job: Update
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self
      persistCredentials: true

    - script: |
        echo "Updating Helm values with new image tag"

        sed -i "s/tag:.*/tag: $(imageTag)/g" helm/rudra-app/values.yaml

        git config user.email "devops@company.com"
        git config user.name "azure-pipeline"

        git add .
        git commit -m "Update image tag to $(imageTag)"
        git push
      displayName: Update Git Repo

# ========================
# 6. ARGOCD SYNC (OPTIONAL)
# ========================
- stage: ArgoCD_Sync
  dependsOn: Update_Manifest
  jobs:
  - job: Sync
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - script: |
        echo "Triggering ArgoCD Sync"

        curl -k -X POST https://argocd-server/api/v1/applications/rudra-dev/sync \
        -H "Authorization: Bearer $(ARGOCD_TOKEN)"
      displayName: ArgoCD Sync