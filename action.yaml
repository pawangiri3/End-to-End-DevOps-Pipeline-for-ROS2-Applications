name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup ROS
        run: sudo apt update && sudo apt install -y ros-jazzy-desktop

      - name: Build
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon build

      - name: Test
        run: |
          source /opt/ros/jazzy/setup.bash
          colcon test

  docker:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Image
        run: docker build -t ghcr.io/${{ github.repository }}/ros2-app:latest .

      - name: Push Image
        run: docker push ghcr.io/${{ github.repository }}/ros2-app:latest