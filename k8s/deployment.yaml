apiVersion: apps/v1
kind: Deployment
metadata:
  name: ros2-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ros2
  template:
    metadata:
      labels:
        app: ros2
    spec:
      containers:
        - name: ros2
          image: rudradevacr.azurecr.io/rudra-2.0:v3
          ports:
            - containerPort: 8000  # metrics

          # WHY: Health checks for production reliability
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5