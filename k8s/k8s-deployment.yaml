# ============================================================================
# Kubernetes Deployment — ROS2 Robot Dashboard
# ============================================================================
# Apply:  kubectl apply -f k8s-deployment.yaml
# Delete: kubectl delete -f k8s-deployment.yaml
# ============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: robotics

---
# ── ConfigMap: non-secret configuration ────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: robot-dashboard-config
  namespace: robotics
data:
  LOG_LEVEL:       "INFO"
  LOG_FORMAT:      "json"
  ROS2_ENABLED:    "true"
  ROS_DOMAIN_ID:   "0"
  APP_VERSION:     "1.0.0"
  MAX_LOG_ENTRIES: "200"

---
# ── Secret: sensitive values (base64 in real usage, plaintext here for demo) 
apiVersion: v1
kind: Secret
metadata:
  name: robot-dashboard-secret
  namespace: robotics
type: Opaque
stringData:
  SECRET_KEY: "change-me-generate-with-openssl-rand-hex-32"

---
# ── Deployment ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: robot-dashboard
  namespace: robotics
  labels:
    app: robot-dashboard
    version: "1.0.0"
spec:
  replicas: 1           # keep at 1: ROS2 node is not fork-safe without DDS
  selector:
    matchLabels:
      app: robot-dashboard
  template:
    metadata:
      labels:
        app: robot-dashboard
    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: robot-dashboard
          image: ros2-robot-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http

          # Inject config from ConfigMap + Secret
          envFrom:
            - configMapRef:
                name: robot-dashboard-config
            - secretRef:
                name: robot-dashboard-secret

          env:
            - name: PORT
              value: "8000"
            - name: HOST
              value: "0.0.0.0"

          # ── Probes ──────────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          # ── Resources ───────────────────────────────────────────────────
          resources:
            requests:
              cpu:    "250m"
              memory: "256Mi"
            limits:
              cpu:    "1000m"
              memory: "512Mi"

          # ── Security context ────────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   false   # ROS2 writes tmp sockets
            runAsNonRoot:             true
            runAsUser:                1000

---
# ── Service ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: robot-dashboard-svc
  namespace: robotics
spec:
  selector:
    app: robot-dashboard
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

---
# ── Ingress (nginx) ──────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: robot-dashboard-ingress
  namespace: robotics
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  rules:
    - host: robot.example.com       # ← change to your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: robot-dashboard-svc
                port:
                  number: 80
