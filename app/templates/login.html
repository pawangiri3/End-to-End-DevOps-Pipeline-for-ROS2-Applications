<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ app_name }} — Authentication</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #050a0e;
      --panel:     #0a1520;
      --border:    #1a3a4a;
      --accent:    #00d4ff;
      --accent2:   #00ff88;
      --danger:    #ff3a5c;
      --dim:       #3a6070;
      --text:      #c8e8f0;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Rajdhani', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: grid-scroll 20s linear infinite;
      pointer-events: none;
    }

    @keyframes grid-scroll {
      0%   { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* Glowing corner accents */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 400px; height: 400px;
      background: radial-gradient(circle at top left, rgba(0,212,255,0.08), transparent 60%);
      pointer-events: none;
    }

    .corner-br {
      position: fixed;
      bottom: 0; right: 0;
      width: 400px; height: 400px;
      background: radial-gradient(circle at bottom right, rgba(0,255,136,0.06), transparent 60%);
      pointer-events: none;
    }

    /* Scan line effect */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 100;
      animation: flicker 8s infinite;
    }

    @keyframes flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.92; }
      97% { opacity: 1; }
      98% { opacity: 0.95; }
    }

    .login-wrap {
      position: relative;
      z-index: 10;
      width: 440px;
    }

    /* Header bar */
    .sys-header {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.2em;
      margin-bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sys-header .blink {
      color: var(--accent2);
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Main panel */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      position: relative;
      padding: 40px;
      clip-path: polygon(
        0 0,
        calc(100% - 20px) 0,
        100% 20px,
        100% 100%,
        20px 100%,
        0 calc(100% - 20px)
      );
    }

    /* Corner decorators */
    .panel::before,
    .panel::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--accent);
      border-style: solid;
    }
    .panel::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }
    .panel::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    /* Accent top stripe */
    .panel-stripe {
      position: absolute;
      top: 0; left: 40px; right: 40px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.7;
    }

    .logo-zone {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      font-size: 48px;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 12px var(--accent));
      animation: pulse-icon 3s ease-in-out infinite;
    }

    @keyframes pulse-icon {
      0%, 100% { filter: drop-shadow(0 0 12px var(--accent)); }
      50%       { filter: drop-shadow(0 0 24px var(--accent)) drop-shadow(0 0 4px var(--accent2)); }
    }

    .logo-title {
      font-family: var(--sans);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #fff;
      text-transform: uppercase;
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--dim);
      margin-top: 6px;
    }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 28px;
    }

    /* Form */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--accent);
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      background: rgba(0,212,255,0.04);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--accent);
      background: rgba(0,212,255,0.08);
      box-shadow: 0 0 0 1px rgba(0,212,255,0.2), inset 0 0 12px rgba(0,212,255,0.05);
    }

    .field input::placeholder {
      color: var(--dim);
    }

    .btn-auth {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      transition: color 0.3s, box-shadow 0.3s;
    }

    .btn-auth::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: translateX(-101%);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      z-index: -1;
    }

    .btn-auth:hover {
      color: var(--bg);
      box-shadow: 0 0 20px rgba(0,212,255,0.4);
    }

    .btn-auth:hover::before {
      transform: translateX(0);
    }

    .btn-auth:active {
      transform: scale(0.98);
    }

    /* Error */
    .error-box {
      background: rgba(255,58,92,0.1);
      border: 1px solid rgba(255,58,92,0.4);
      border-left: 3px solid var(--danger);
      padding: 10px 14px;
      margin-bottom: 20px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--danger);
      letter-spacing: 0.05em;
    }

    /* Footer */
    .panel-footer {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--dim);
      text-align: center;
      margin-top: 24px;
      letter-spacing: 0.15em;
    }

    /* Status indicators */
    .status-row {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--dim);
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 6px var(--accent2);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .dot.red { background: var(--danger); box-shadow: 0 0 6px var(--danger); animation: none; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.7); }
    }
  </style>
</head>
<body>
  <div class="corner-br"></div>
  <div class="scanlines"></div>

  <div class="login-wrap">
    <div class="sys-header">
      <span>SYS-AUTH v2.4.1</span>
      <span class="blink">■ AWAITING CREDENTIALS</span>
      <span id="clock">--:--:--</span>
    </div>

    <div class="panel">
      <div class="panel-stripe"></div>

      <div class="logo-zone">
        <div class="logo-icon">🤖</div>
        <div class="logo-title">{{ app_name }}</div>
        <div class="logo-sub">ROS2 · JAZZY · COMMAND INTERFACE</div>
      </div>

      <hr class="divider"/>

      <div class="status-row">
        <div class="status-pill">
          <div class="dot"></div>
          ROS2 ONLINE
        </div>
        <div class="status-pill">
          <div class="dot"></div>
          API HEALTHY
        </div>
        <div class="status-pill">
          <div class="dot"></div>
          NODE ACTIVE
        </div>
      </div>

      {% if error %}
      <div class="error-box">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/login" autocomplete="off">
        <div class="field">
          <label>Operator ID</label>
          <input type="text" name="username" placeholder="Enter username" required autofocus/>
        </div>
        <div class="field">
          <label>Access Code</label>
          <input type="password" name="password" placeholder="Enter password" required/>
        </div>
        <button type="submit" class="btn-auth">AUTHENTICATE →</button>
      </form>

      <div class="panel-footer">
        CREDENTIALS: admin / r0b0t123 &nbsp;|&nbsp; devops / demo2024
      </div>
    </div>
  </div>

  <script>
    // Live clock
    function tick() {
      document.getElementById('clock').textContent =
        new Date().toISOString().split('T')[1].slice(0,8) + ' UTC';
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
