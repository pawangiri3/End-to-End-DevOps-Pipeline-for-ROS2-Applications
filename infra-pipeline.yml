trigger:
- main

variables:
  TF_WORKING_DIR: 'infra'
  TF_VAR_FILE: 'envs/dev.tfvars'
  backendServiceArm: 'Azure-ServiceConnection'

stages:

# ========================
# 1. VALIDATE + INIT + PLAN
# ========================
- stage: Terraform_Plan
  displayName: Terraform Plan
  jobs:
  - job: Plan
    pool:
      vmImage: 'ubuntu-latest'

    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: '1.5.7'

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/$(TF_WORKING_DIR)'
        backendServiceArm: $(backendServiceArm)
        backendAzureRmResourceGroupName: 'tfstate-rg'
        backendAzureRmStorageAccountName: 'tfstatestorage123'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'dev.terraform.tfstate'

    - task: TerraformTaskV4@4
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(System.DefaultWorkingDirectory)/$(TF_WORKING_DIR)'

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/$(TF_WORKING_DIR)'
        commandOptions: '-var-file=$(TF_VAR_FILE)'
        environmentServiceNameAzureRM: $(backendServiceArm)

# ========================
# 2. APPLY (WITH APPROVAL)
# ========================
- stage: Terraform_Apply
  displayName: Terraform Apply
  dependsOn: Terraform_Plan
  condition: succeeded()

  jobs:
  - deployment: Apply
    environment: dev   # 👈 add approval here
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: '1.5.7'

          - task: TerraformTaskV4@4
            displayName: Terraform Init
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)/$(TF_WORKING_DIR)'
              backendServiceArm: $(backendServiceArm)
              backendAzureRmResourceGroupName: 'tfstate-rg'
              backendAzureRmStorageAccountName: 'tfstatestorage123'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'dev.terraform.tfstate'

          - task: TerraformTaskV4@4
            displayName: Terraform Apply
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(System.DefaultWorkingDirectory)/$(TF_WORKING_DIR)'
              commandOptions: '-auto-approve -var-file=$(TF_VAR_FILE)'
              environmentServiceNameAzureRM: $(backendServiceArm)