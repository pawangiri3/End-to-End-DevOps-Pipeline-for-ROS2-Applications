trigger: none
  # branches:
  #   include:
  #   - main

variables:
- name: ENV
  value: 'dev'

- name: TF_WORKING_DIR
  value: 'infra/envs/$(ENV)'

- name: TF_VAR_FILE
  value: 'terraform.tfvars'
  
- name: backendServiceArm
  value: 'Azure Resource Manager'

- name: INFRACOST_API_KEY
  value: 'your-api-key'

stages:
- stage: Terraform_Plan
  displayName: Terraform init and Plan
  jobs:
  - job: Plan
    pool:
      name: Rudra
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/$(TF_WORKING_DIR)'
        backendServiceArm: 'Azure Resource Manager'
        backendAzureRmResourceGroupName: 'Do_not_delete_rg'
        backendAzureRmStorageAccountName: 'donotdelete2026'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'dev.tfstate'

    - task: TerraformTaskV4@4
      displayName: Terraform Validate
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: '$(System.DefaultWorkingDirectory)/$(TF_WORKING_DIR)'

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/$(TF_WORKING_DIR)'
        commandOptions: '-var-file=$(TF_VAR_FILE)'

# ========================
# SCANNING STAGE
# ========================
- stage: Terraform_Scan
  displayName: "🔍 Terraform Security & Lint Scan"
  dependsOn: Terraform_Plan
  condition: succeededOrFailed()
  jobs:
  - job: Scan
    pool:
      name: Rudra
    steps:
    - checkout: self

    # ✅ FIX 1: TFLint task properly closed — Checkov is now a separate task
    - task: CmdLine@2
      displayName: Run TFLint (Docker)
      continueOnError: true
      inputs:
        script: |
          echo Running TFLint via Docker...
          docker run --rm ^
            -v "$(System.DefaultWorkingDirectory):/data" ^
            ghcr.io/terraform-linters/tflint:latest ^
            --chdir=/data/$(TF_WORKING_DIR)

    # ✅ FIX 2: Checkov is now its own sibling task (not nested inside TFLint)
    - task: CmdLine@2
      displayName: Run Checkov (Docker)
      continueOnError: true
      inputs:
        script: |
          echo Running Checkov via Docker...
          docker run --rm ^
            -v "$(System.DefaultWorkingDirectory):/tf" ^
            bridgecrew/checkov:latest ^
            -d /tf/$(TF_WORKING_DIR)

# ========================
# COST ESTIMATION STAGE
# ========================
- stage: Terraform_Cost
  displayName: "💰 Terraform Cost Estimation (Infracost)"
  dependsOn: Terraform_Scan
  condition: succeededOrFailed()
  jobs:
  - job: Cost
    pool:
      name: Rudra
    steps:
    - checkout: self

    - task: CmdLine@2
      displayName: Run Infracost (Docker)
      continueOnError: true
      inputs:
        # ✅ FIX 3: script content properly indented + missing ^ added on docker run line
        script: |
          echo Running Infracost via Docker...
          docker run --rm ^
            -e INFRACOST_API_KEY=$(INFRACOST_API_KEY) ^
            -v "$(System.DefaultWorkingDirectory):/code" ^
            infracost/infracost:latest breakdown ^
            --path=/code/$(TF_WORKING_DIR)

# ========================
# APPROVAL STAGE (NO AGENT)
# ========================
- stage: Approval
  displayName: Manual Approval
  dependsOn: Terraform_Cost
  condition: succeeded()
  jobs:
  - job: WaitForApproval
    displayName: Waiting for Approval
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'chandanjataha@gmail.com'
        instructions: 'Please review Terraform plan and approve to proceed with Apply'
        onTimeout: 'reject'
        timeout: '1d'

# ========================
# APPLY STAGE
# ========================
- stage: Terraform_Apply
  displayName: Terraform Apply
  dependsOn: Approval
  condition: succeeded()
  jobs:
  - job: Apply
    pool:
      name: Rudra
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/$(TF_WORKING_DIR)'
        backendServiceArm: 'Azure Resource Manager'
        backendAzureRmResourceGroupName: 'Do_not_delete_rg'
        backendAzureRmStorageAccountName: 'donotdelete2026'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: 'dev.tfstate'

    - task: TerraformTask@5
      displayName: Terraform Apply (Infrastructure Deployment)
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/$(TF_WORKING_DIR)'
        commandOptions: '-auto-approve -var-file=$(TF_VAR_FILE)'
        environmentServiceNameAzureRM: 'Azure Resource Manager'

